<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7C3AED">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="健康顾问">
  <title>健康顾问</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #fff; }
    .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; }
    .page.hidden { display: none !important; }

    #page-setup { align-items: center; justify-content: center; padding: 32px 24px; }
    #page-setup h1 { font-size: 22px; color: #1F2937; margin-bottom: 8px; }
    #page-setup > p { font-size: 14px; color: #6B7280; margin-bottom: 32px; text-align: center; line-height: 1.6; }
    .input-wrap { position: relative; width: 100%; max-width: 360px; margin-bottom: 16px; }
    .input-wrap input { width: 100%; padding: 14px 48px 14px 16px; border: 2px solid #7C3AED; border-radius: 10px; font-size: 15px; color: #1F2937; outline: none; background: #fff; }
    .input-wrap .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #6B7280; font-size: 18px; line-height: 1; padding: 4px; }
    .hint-text { font-size: 12px; color: #9CA3AF; text-align: center; max-width: 360px; line-height: 1.6; }
    .hint-text a { color: #7C3AED; text-decoration: none; }

    #page-home { align-items: center; justify-content: center; }
    .home-icon { width: 80px; height: 80px; background: #7C3AED; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 20px rgba(124,58,237,0.35); transition: transform 0.15s ease; }
    .home-icon:active { transform: scale(0.93); }
    .home-icon span { color: #fff; font-size: 32px; font-weight: bold; }
    .home-label { margin-top: 10px; font-size: 16px; color: #7C3AED; font-weight: 500; }

    #page-select { align-items: center; justify-content: center; }
    #page-select h2 { font-size: 16px; color: #374151; margin-bottom: 24px; }
    .btn { display: block; width: 240px; height: 52px; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; transition: opacity 0.15s ease, transform 0.15s ease; text-align: center; line-height: 52px; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #7C3AED; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-disabled { background: #D1D5DB !important; color: #9CA3AF !important; cursor: not-allowed !important; pointer-events: none !important; }
    .btn + .btn { margin-top: 16px; }

    #page-create { padding: 0; }
    .nav-bar { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #F3F4F6; min-height: 52px; flex-shrink: 0; }
    .nav-back { background: none; border: none; font-size: 15px; color: #7C3AED; cursor: pointer; padding: 4px 8px 4px 0; display: flex; align-items: center; gap: 4px; }
    .nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: #7C3AED; }
    .nav-right { width: 60px; }
    .create-body { flex: 1; padding: 24px 20px; overflow-y: auto; }
    .create-body h2 { font-size: 20px; color: #7C3AED; text-align: center; margin-bottom: 8px; }
    .create-body .sub { font-size: 13px; color: #9CA3AF; text-align: center; margin-bottom: 20px; }
    .profile-input { width: 100%; min-height: 160px; padding: 12px; border: 2px solid #7C3AED; border-radius: 8px; font-size: 15px; color: #1F2937; resize: vertical; outline: none; font-family: inherit; line-height: 1.6; transition: border-color 0.2s; }
    .profile-input.error { border-color: #EF4444; animation: shake 0.3s ease; }
    .profile-input:focus { border-color: #5B21B6; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    #page-chat { flex-direction: column; }
    .chat-nav { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #F3F4F6; flex-shrink: 0; }
    .chat-clear-btn { background: none; border: 1px solid #D1D5DB; border-radius: 8px; padding: 5px 10px; font-size: 12px; color: #6B7280; cursor: pointer; white-space: nowrap; }
    .chat-clear-btn:active { background: #F3F4F6; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 12px; }
    .msg-row { display: flex; flex-direction: column; }
    .msg-row.user { align-items: flex-end; }
    .msg-row.ai { align-items: flex-start; }
    .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 15px; line-height: 1.6; word-break: break-word; }
    .msg-row.user .msg-bubble { background: #7C3AED; color: #fff; border-bottom-right-radius: 4px; }
    .msg-row.ai .msg-bubble { background: #F3F4F6; color: #1F2937; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 11px; color: #9CA3AF; margin-top: 4px; padding: 0 4px; }
    .msg-bubble p { margin: 0 0 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble strong { font-weight: 600; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 4px 0; }
    .msg-bubble li { margin-bottom: 2px; }
    .typing-dot { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dot span { width: 7px; height: 7px; background: #9CA3AF; border-radius: 50%; animation: blink 1.2s infinite; }
    .typing-dot span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    .chat-input-bar { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-top: 1px solid #F3F4F6; background: #fff; flex-shrink: 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
    .chat-input { flex: 1; padding: 10px 16px; border: 2px solid #7C3AED; border-radius: 24px; font-size: 15px; outline: none; font-family: inherit; color: #1F2937; background: #fff; }
    .chat-input:disabled { border-color: #D1D5DB; background: #F9FAFB; }
    .send-btn { width: 44px; height: 44px; background: #7C3AED; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
    .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; fill: #fff; }
    .send-btn .spin { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-save { background: #7C3AED; color: #fff; width: 100%; max-width: 360px; height: 52px; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
    .btn-save:active { opacity: 0.85; }
    .welcome-tip { text-align: center; color: #9CA3AF; font-size: 13px; padding: 16px 0; }
  </style>
</head>
<body>

<div class="page hidden" id="page-setup">
  <div style="width:64px;height:64px;background:#7C3AED;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:24px;">
    <span style="color:#fff;font-size:26px;font-weight:bold;">健</span>
  </div>
  <h1>首次使用设置</h1>
  <p>请输入您的 DeepSeek API Key<br>仅保存在本机，不会上传</p>
  <div class="input-wrap">
    <input type="password" id="api-key-input" placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off">
    <button class="toggle-pw" onclick="togglePw()">👁</button>
  </div>
  <button class="btn-save" onclick="saveApiKey()">保存并开始使用</button>
  <p class="hint-text" style="margin-top:16px;">
    还没有 API Key？<br>
    访问 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 免费注册获取
  </p>
</div>

<div class="page hidden" id="page-home">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <div class="home-icon" onclick="goSelect()"><span>健</span></div>
    <p class="home-label">健康顾问</p>
  </div>
</div>

<div class="page hidden" id="page-select">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <h2>请选择操作</h2>
    <button class="btn btn-primary" onclick="goCreate()">创造</button>
    <button class="btn btn-primary" id="btn-use" onclick="goChat()">使用</button>
    <button class="btn btn-primary" id="btn-clear" onclick="clearAll()">清除</button>
  </div>
</div>

<div class="page hidden" id="page-create">
  <div class="nav-bar">
    <button class="nav-back" onclick="showPage('page-select')">← 返回</button>
    <div class="nav-title">健康顾问</div>
    <div class="nav-right"></div>
  </div>
  <div class="create-body">
    <h2>输入您的身体数据</h2>
    <p class="sub">您的数据仅保存在本机，不会上传</p>
    <textarea class="profile-input" id="profile-input"
      placeholder="例如：年龄28岁，身高175cm，体重70kg，有轻度高血压，对花粉过敏，日常久坐办公..."></textarea>
    <button style="width:100%;height:52px;background:#7C3AED;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;margin-top:16px;" onclick="saveProfile()">确认</button>
  </div>
</div>

<div class="page hidden" id="page-chat">
  <div class="chat-nav">
    <button class="nav-back" onclick="showPage('page-select')">← 返回</button>
    <div class="nav-title">健康顾问</div>
    <div style="display:flex;gap:6px;">
      <button class="chat-clear-btn" onclick="location.href='./reset.html'" title="修改API Key">🔑</button>
      <button class="chat-clear-btn" onclick="clearChat()">清除记忆</button>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages">
    <p class="welcome-tip" id="welcome-tip">您好！请输入您的健康问题</p>
  </div>
  <div class="chat-input-bar">
    <input class="chat-input" type="text" id="chat-input" placeholder="输入您的问题..." autocomplete="off">
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="#fff"/></svg>
    </button>
  </div>
</div>

<script>
const K = { API:'deepseek_api_key', PROFILE:'health_profile', HAS:'has_profile', HISTORY:'chat_history' };
let isSending = false;

const ls    = k => localStorage.getItem(k);
const lsSet = (k,v) => localStorage.setItem(k,v);
const lsDel = (...ks) => ks.forEach(k => localStorage.removeItem(k));

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if (id === 'page-select') refreshSelectBtns();
  if (id === 'page-chat') { loadChatHistory(); setTimeout(scrollToBottom, 50); }
}

function refreshSelectBtns() {
  const has = ls(K.HAS) === 'true';
  ['btn-use','btn-clear'].forEach(id => {
    document.getElementById(id).className = 'btn ' + (has ? 'btn-primary' : 'btn-disabled');
  });
}

window.addEventListener('load', () => {
  if (location.search.includes('setup') || !ls(K.API)) {
    showPage('page-setup');
  } else {
    showPage('page-home');
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  }
});

function togglePw() {
  const inp = document.getElementById('api-key-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) { alert('请输入 API Key'); return; }
  lsSet(K.API, val);
  if (location.search.includes('setup')) history.replaceState(null,'',location.pathname);
  showPage('page-home');
}

function goSelect() { showPage('page-select'); }
function goCreate()  { showPage('page-create'); }
function goChat()    { showPage('page-chat'); }

function saveProfile() {
  const inp = document.getElementById('profile-input');
  const val = inp.value.trim();
  if (!val) { inp.classList.add('error'); setTimeout(() => inp.classList.remove('error'), 600); return; }
  lsSet(K.PROFILE, val);
  lsSet(K.HAS, 'true');
  lsDel(K.HISTORY);
  showPage('page-chat');
}

function clearAll() {
  lsDel(K.PROFILE, K.HAS, K.HISTORY);
  showPage('page-select');
}

function clearChat() {
  lsDel(K.HISTORY);
  document.getElementById('chat-messages').innerHTML = '<p class="welcome-tip" id="welcome-tip">您好！请输入您的健康问题</p>';
}

function getHistory() { try { return JSON.parse(ls(K.HISTORY)||'[]'); } catch { return []; } }
function saveHistory(h) { lsSet(K.HISTORY, JSON.stringify(h)); }

function loadChatHistory() {
  const msgs = document.getElementById('chat-messages');
  const history = getHistory();
  if (!history.length) { msgs.innerHTML = '<p class="welcome-tip" id="welcome-tip">您好！请输入您的健康问题</p>'; return; }
  msgs.innerHTML = '';
  history.forEach(m => appendBubble(m.role === 'user' ? 'user' : 'ai', m.content));
}

function scrollToBottom() { const m = document.getElementById('chat-messages'); m.scrollTop = m.scrollHeight; }

function formatTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function md2html(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'• $1')
    .replace(/\n\n+/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

function appendBubble(role, text) {
  const msgs = document.getElementById('chat-messages');
  const tip  = document.getElementById('welcome-tip');
  if (tip) tip.remove();
  const row    = document.createElement('div'); row.className = 'msg-row ' + role;
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
  if (role === 'ai') { bubble.innerHTML = '<p>' + md2html(text) + '</p>'; } else { bubble.textContent = text; }
  const time = document.createElement('div'); time.className = 'msg-time'; time.textContent = formatTime();
  row.appendChild(bubble); row.appendChild(time); msgs.appendChild(row); scrollToBottom();
  return { row, bubble };
}

async function sendMessage() {
  if (isSending) return;
  const inp  = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;

  isSending = true; inp.value = ''; inp.disabled = true;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true; sendBtn.innerHTML = '<div class="spin"></div>';

  appendBubble('user', text);
  const history = getHistory(); history.push({ role:'user', content:text });

  const msgs = document.getElementById('chat-messages');
  const tip  = document.getElementById('welcome-tip'); if (tip) tip.remove();
  const aiRow = document.createElement('div'); aiRow.className = 'msg-row ai';
  const aiBubble = document.createElement('div'); aiBubble.className = 'msg-bubble';
  aiBubble.innerHTML = '<div class="typing-dot"><span></span><span></span><span></span></div>';
  const aiTime = document.createElement('div'); aiTime.className = 'msg-time'; aiTime.textContent = formatTime();
  aiRow.appendChild(aiBubble); aiRow.appendChild(aiTime); msgs.appendChild(aiRow); scrollToBottom();

  const profile = ls(K.PROFILE) || '未提供身体数据';
  const systemPrompt = `你是一位专业的AI健康顾问，请根据用户的身体数据提供个性化健康建议。用户的身体数据如下：${profile}。请用简洁友好的中文回答，给出专业但易懂的健康建议，适当时提醒用户就医。每次回复控制在300字以内，除非用户要求详细说明。`;
  const apiKey = ls(K.API);

  try {
    const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
      body: JSON.stringify({ model:'deepseek-chat', messages:[{role:'system',content:systemPrompt},...history], stream:true, max_tokens:800 })
    });

    if (resp.status === 401) {
      aiBubble.innerHTML = '<p style="color:#EF4444;">API Key 无效，点右上角 🔑 重新设置</p>';
      throw new Error('401');
    }
    if (resp.status === 402) {
      aiBubble.innerHTML = '<p style="color:#EF4444;">API 余额不足，请前往 platform.deepseek.com 充值</p>';
      throw new Error('402');
    }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader(); const decoder = new TextDecoder('utf-8');
    let aiText = ''; aiBubble.innerHTML = '';
    while (true) {
      const { value, done } = await reader.read(); if (done) break;
      const lines = decoder.decode(value, { stream:true }).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim(); if (raw === '[DONE]') break;
        try {
          const delta = JSON.parse(raw)?.choices?.[0]?.delta?.content;
          if (delta) { aiText += delta; aiBubble.innerHTML = '<p>' + md2html(aiText) + '</p>'; scrollToBottom(); }
        } catch {}
      }
    }
    history.push({ role:'assistant', content:aiText }); saveHistory(history);

  } catch (err) {
    if (!['401','402'].includes(err.message)) {
      if (aiBubble.querySelector('.typing-dot') || !aiBubble.textContent.trim()) {
        aiBubble.innerHTML = '<p style="color:#EF4444;">网络连接失败，请检查网络后重试</p>';
      }
    }
  }

  isSending = false; inp.disabled = false;
  sendBtn.disabled = false;
  sendBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="#fff"/></svg>';
  inp.focus();
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
